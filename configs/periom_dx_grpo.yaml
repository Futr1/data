working_dir: multimodal/model/R1-V/src/r1-v
script: src/open_r1/grpo.py
env:
  DEBUG_MODE: "false"
  LOG_PATH: outputs/periom_dx/grpo_debug.log
torchrun:
  nproc_per_node: 4
  nnodes: 1
  node_rank: 0
  master_addr: "127.0.0.1"
  master_port: "12345"
use_vllm: false
output_dir: outputs/periom_dx/grpo_model
model_name_or_path: Qwen/Qwen2-VL-2B-Instruct
dataset_name: REPLACE_WITH_CONTROLLED_OR_HF_DATASET
max_prompt_length: 4096
max_completion_length: 1024
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1e-6
lr_scheduler_type: constant
logging_steps: 1
bf16: true
gradient_checkpointing: true
attn_implementation: flash_attention_2
min_pixels: 3136
max_pixels: 501760
num_train_epochs: 2
run_name: periom_dx_grpo
save_steps: 200
save_total_limit: 3
save_only_model: true
report_to: wandb
temperature: 1.0
num_generations: 8
reward_funcs:
  - accuracy
  - format
deepspeed: src/r1-v/local_scripts/zero1_no_optimizer.json
